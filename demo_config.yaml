# Demo configuration for pyecflow
# This file demonstrates the structure of a workflow configuration

# Optional: Specify custom header file paths
# If omitted or paths are empty, defaults from static/ are used
# headers:
#   head: /path/to/custom/head.h
#   tail: /path/to/custom/tail.h
#   envir: /path/to/custom/envir-p1.h

family_A:
  tasks:
    task_A1:
      variables:
        NUMBER: 1
      script: "echo family_A task_A1 NUMBER=$NUMBER"
    task_A2:
      variables:
        NUMBER: 2
      script: "echo family_A task_A2 NUMBER=$NUMBER"
  children:
    family_Aa:
      tasks:
        task_Aa1:
          variables:
            NUMBER: 11
          script: "echo family_Aa task_Aa1 NUMBER=$NUMBER"
      children: {}
    family_Ab:
      tasks:
        task_Ab1:
          variables:
            NUMBER: 21
          script: "echo family_Ab task_Ab1 NUMBER=$NUMBER"
        task_Ab2:
          variables:
            NUMBER: 22
          script: "echo family_Ab task_Ab2 NUMBER=$NUMBER"
      children: {}

family_B:
  tasks:
    task_B1:
      variables:
        NUMBER: 1
      script: "echo family_B task_B1 NUMBER=$NUMBER"
  children:
    family_Ba:
      tasks:
        task_Ba1:
          variables:
            NUMBER: 11
          script: "echo family_Ba task_Ba1 NUMBER=$NUMBER"
      children: {}
